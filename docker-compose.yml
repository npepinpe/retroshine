services:
  retroshine:
    image: retroshine:latest
    container_name: retroshine
    restart: unless-stopped

    # host networking is required for Moonlight mDNS auto-discovery;
    # it is incompatible with named Docker networks
    network_mode: host

    devices:
      - /dev/dri/card0:/dev/dri/card0
      - /dev/dri/renderD128:/dev/dri/renderD128
      - /dev/tty0:/dev/tty0
      - /dev/tty7:/dev/tty7
      - /dev/uinput:/dev/uinput

    volumes:
      - retroshine-config:/config
      - retroshine-games:/games:ro
      - /dev/input:/dev/input

    environment:
      - SUNSHINE_USER=admin
      - SUNSHINE_PASS=changeme
      - LIBVA_DRIVER_NAME=iHD

    shm_size: 256m

    #privileged: true  # fallback if Xorg refuses to open /dev/tty0

volumes:
  retroshine-config:
    driver: local
  retroshine-games:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/main/data/media/games
