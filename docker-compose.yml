services:
  retroshine:
    image: retroshine:latest
    build:
      context: .
      args:
        SUNSHINE_VERSION: "0.23.1"
    container_name: retroshine
    restart: unless-stopped

    network_mode: host

    devices:
      # Render node only — VAAPI encoding for Sunshine.
      # Xvfb handles display in software so card0 and tty devices aren't needed.
      - /dev/dri/renderD128:/dev/dri/renderD128
      - /dev/uinput:/dev/uinput

    volumes:
      - retroshine-config:/config
      - /mnt/main/data/media/games:/games:ro
      - /dev/input:/dev/input

    environment:
      - SUNSHINE_USER=admin
      - SUNSHINE_PASS=changeme
      - LIBVA_DRIVER_NAME=iHD

    shm_size: 256m

volumes:
  retroshine-config:
    driver: local
