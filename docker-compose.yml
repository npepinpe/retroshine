services:
  retroshine:
    image: retroshine:latest
    container_name: retroshine
    restart: unless-stopped

    networks:
      - retroshine

    ports:
      - "47984:47984/tcp"
      - "47989:47989/tcp"
      - "47990:47990/tcp"
      - "47998:47998/udp"
      - "47999:47999/udp"
      - "48000:48000/udp"
      - "48010:48010/tcp"

    devices:
      - /dev/dri/card0:/dev/dri/card0
      - /dev/dri/renderD128:/dev/dri/renderD128
      - /dev/tty0:/dev/tty0
      - /dev/tty7:/dev/tty7
      - /dev/uinput:/dev/uinput

    volumes:
      - retroshine-config:/config
      - retroshine-games:/games:ro
      - /dev/input:/dev/input

    environment:
      - SUNSHINE_USER=admin
      - SUNSHINE_PASS=changeme
      - LIBVA_DRIVER_NAME=iHD

    shm_size: 256m

    #privileged: true  # fallback if Xorg refuses to open /dev/tty0

networks:
  retroshine:

volumes:
  retroshine-config:
    driver: local
  retroshine-games:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/main/data/media/games
