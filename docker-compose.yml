services:
  retroshine:
    image: retroshine:latest
    container_name: retroshine
    hostname: pandora
    restart: unless-stopped

    networks:
      - retroshine

    ports:
      - "47984:47984/tcp"
      - "47989:47989/tcp"
      - "47990:47990/tcp"
      - "47998:47998/udp"
      - "47999:47999/udp"
      - "48000:48000/udp"
      - "48010:48010/tcp"

    devices:
      - /dev/dri/card0:/dev/dri/card0
      - /dev/dri/renderD128:/dev/dri/renderD128
      - /dev/tty0:/dev/tty0
      - /dev/tty7:/dev/tty7
      - /dev/uinput:/dev/uinput

    volumes:
      - retroshine-config:/config
      - retroshine-games:/games:ro
      - /dev/input:/dev/input

    environment:
      - SUNSHINE_USER    # set in .env on the NAS; falls back to 'admin' if unset
      - SUNSHINE_PASS    # set in .env on the NAS; falls back to 'changeme' if unset
      - LIBVA_DRIVER_NAME=iHD
      - RESEED_CONFIG=false  # set to true to overwrite all seeded configs on next boot

    cap_add:
      - SYS_ADMIN   # KMS capture: DRM lease from Xorg
      - SYS_NICE    # real-time priority for Sunshine encoder/capture threads

    device_cgroup_rules:
      - 'c 13:* rmw'  # input subsystem: allow dynamically created /dev/input/eventX nodes

    shm_size: 256m

    #privileged: true  # fallback if Xorg refuses to open /dev/tty0

networks:
  retroshine:

volumes:
  retroshine-config:
    driver: local
  retroshine-games:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/main/data/media/games
