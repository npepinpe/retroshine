# ── Sunshine configuration ────────────────────────────────────────────────────
# Full option reference: https://docs.lizardbyte.dev/projects/sunshine/en/latest/

sunshine_name = pandora

# State / credential / TLS files (persisted in the /config volume)
# cert+pkey must survive restarts — if they change, every client must re-pair.
file_state       = /config/sunshine/state.json
credentials_file = /config/sunshine/credentials.json
cert             = /config/sunshine/sunshine.cert
pkey             = /config/sunshine/sunshine.key
log_path         = /config/logs/sunshine.log
min_log_level    = info

# ── Capture ───────────────────────────────────────────────────────────────────
# kms captures directly from the DRM framebuffer (lower latency than x11)
capture = kms

# ── Encoding (VAAPI via Intel iGPU / Quick Sync) ──────────────────────────────
# iHD driver — correct for Intel Alder Lake-N (N100) and newer
encoder      = vaapi
adapter_name = /dev/dri/renderD128
# Force H.264 for all clients. The N100's VAAPI HEVC encoder is significantly
# weaker than its H.264 encoder, causing frame drops on demanding clients
# (e.g. Shield TV Pro) that would otherwise negotiate HEVC.
hevc_mode = 0
av1_mode  = 0

# ── Network ───────────────────────────────────────────────────────────────────
port                  = 47989
# Advertise the NAS's real LAN IP — without this Sunshine tells Moonlight
# to connect to the Docker bridge IP (172.x.x.x) which is unreachable.
external_ip           = 192.168.2.197
# Allow pairing from anywhere on the LAN; restrict the web UI likewise
origin_pin_allowed    = lan
origin_web_ui_allowed = wan
csrf_allowed_origins  = https://games.internal.nala.casa
# Accept both IPv4 and IPv6
address_family        = both
# Docker bridge IPs appear as WAN to Sunshine; disable encryption so Moonlight
# can connect without TLS errors (homelab-only, no external exposure).
wan_encryption_mode   = 0

# ── Stream quality defaults ───────────────────────────────────────────────────
# The client (Moonlight) can override these at connect time
fps         = [60, 30]
resolutions = [1920x1080, 1280x720]

# ── Applications ─────────────────────────────────────────────────────────────
# apps.json lives alongside this file in /config/sunshine/
