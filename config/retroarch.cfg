# ── RetroArch configuration ───────────────────────────────────────────────────
# This is the seed config. Your live config lives in /config/retroarch/retroarch.cfg
# (persisted via the Docker volume).

# ── Directories ───────────────────────────────────────────────────────────────
# BIOS files (e.g. scph1001.bin for PS1, bios_CD_E.bin for Mega CD, etc.)
system_directory = "/games/bioses"

# Persistent save data
savefile_directory      = "/config/retroarch/saves"
savestate_directory     = "/config/retroarch/states"
screenshot_directory    = "/config/retroarch/screenshots"

# Cores downloaded via Online Updater → Core Downloader
libretro_directory      = "/config/retroarch/cores"
libretro_info_path      = "/config/retroarch/info"

# Default start path for the file browser → Load Content
content_directory = "/games"

# ── Video ─────────────────────────────────────────────────────────────────────
# Vulkan via Intel ANV (mesa-vulkan-drivers) — hardware-accelerated on the iGPU.
# Enables slang shaders, widescreen hacks, and internal resolution upscaling.
# Falls back gracefully to gl if Vulkan init fails.
video_driver          = "vulkan"
video_fullscreen      = "true"
video_windowed_fullscreen = "false"
video_scale           = "1.000000"
video_vsync           = "true"
video_smooth          = "false"

# ── Audio ─────────────────────────────────────────────────────────────────────
audio_driver  = "pulse"
audio_enable  = "true"
audio_latency = 64

# ── Input ─────────────────────────────────────────────────────────────────────
# Sunshine creates virtual controllers via uinput when Moonlight clients connect.
# RetroArch hot-plugs them automatically.
input_driver           = "udev"
input_joypad_driver    = "udev"
# Autoconfig profiles from the libretro-core-info package
input_autodetect_enable = "true"

# ── Misc ──────────────────────────────────────────────────────────────────────
pause_nonactive         = "false"
menu_driver             = "ozone"
video_font_enable       = "true"

# RetroArch checks for its own updates — disable in a container
network_cmd_enable      = "false"
