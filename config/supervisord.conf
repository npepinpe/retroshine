[supervisord]
nodaemon=true
user=root
logfile=/config/logs/supervisord.log
logfile_maxbytes=10MB
logfile_backups=3
pidfile=/tmp/supervisord.pid
loglevel=info

; ── 1. Xorg (real Intel GPU via modesetting + DRI3, headless HDMI dummy) ─────
[program:xorg]
command=Xorg :1 vt7 -config /etc/retroshine/xorg.conf -nolisten tcp -noreset -logfile /config/logs/xorg.log
priority=10
autorestart=true
startsecs=3
stdout_logfile=/dev/null
stderr_logfile=/dev/null

; ── 2. PulseAudio (virtual null sink — captured by Sunshine) ─────────────────
[program:pulseaudio]
command=pulseaudio --system --disallow-exit --disallow-module-loading=false --log-target=file:/config/logs/pulseaudio.log --exit-idle-time=-1 --file=/etc/retroshine/pulse.pa
priority=20
autorestart=true
startsecs=3
stdout_logfile=/dev/null
stderr_logfile=/dev/null

; ── 3. RetroArch (persistent fullscreen — always visible on connect) ──────────
[program:retroarch]
command=/usr/local/bin/wait-for-x.sh retroarch --config /config/retroarch/retroarch.cfg
priority=30
autorestart=true
startsecs=5
environment=DISPLAY=":1",PULSE_SERVER="unix:/tmp/runtime/pulse/native",LIBVA_DRIVER_NAME="iHD",HOME="/root",XDG_RUNTIME_DIR="/tmp/runtime"
stdout_logfile=/config/logs/retroarch.log
stderr_logfile=/config/logs/retroarch.log
stopasgroup=true
killasgroup=true

; ── 4. Sunshine (streaming server) ───────────────────────────────────────────
[program:sunshine]
command=/usr/bin/sunshine /config/sunshine/sunshine.conf
priority=40
autorestart=true
startsecs=5
environment=DISPLAY=":1",PULSE_SERVER="unix:/tmp/runtime/pulse/native",LIBVA_DRIVER_NAME="iHD",HOME="/root",XDG_RUNTIME_DIR="/tmp/runtime"
stdout_logfile=/config/logs/sunshine.log
stderr_logfile=/config/logs/sunshine.log
stopasgroup=true
killasgroup=true
