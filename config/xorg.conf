# Xorg configuration for headless Intel GPU (Alder Lake-N / N100)
# Requires a headless HDMI dummy plug in the HDMI port so the GPU
# has an active CRTC — without it Xorg will report "no screens found".

Section "ServerFlags"
    # Don't let Xorg manage input — RetroArch reads /dev/input via udev directly,
    # and Sunshine injects virtual controllers through uinput.
    Option "AutoAddDevices"   "false"
    Option "AutoEnableDevices" "false"
    Option "AutoAddGPU"       "false"
    Option "DontZap"          "false"
EndSection

Section "ServerLayout"
    Identifier "Layout0"
    Screen     "Screen0"
    # Void input drivers satisfy Xorg's requirement for at least one
    # core keyboard and pointer without actually consuming any input events.
    InputDevice "VoidKeyboard" "CoreKeyboard"
    InputDevice "VoidPointer"  "CorePointer"
EndSection

Section "InputDevice"
    Identifier "VoidKeyboard"
    Driver     "void"
EndSection

Section "InputDevice"
    Identifier "VoidPointer"
    Driver     "void"
EndSection

Section "Device"
    Identifier "Intel-iGPU"
    Driver     "modesetting"
    # Explicit DRM device — card0 is the Intel display engine on NASync/N100.
    # If Xorg fails to open it, check 'ls /dev/dri/' inside the container.
    Option "kmsdev"      "/dev/dri/card0"
    Option "DRI"         "3"
    # Glamor provides hardware-accelerated 2D and GLX on top of the GPU
    Option "AccelMethod" "glamor"
EndSection

Section "Monitor"
    Identifier "HDMI-Dummy"
    # Standard ranges that match the common 1920x1080@60 EDID from dummy plugs
    HorizSync   28-100
    VertRefresh 48-75
    Option "DPMS" "false"
EndSection

Section "Screen"
    Identifier "Screen0"
    Device     "Intel-iGPU"
    Monitor    "HDMI-Dummy"
    DefaultDepth 24
    SubSection "Display"
        Depth   24
        Modes   "1920x1080"
        Virtual 1920 1080
    EndSubSection
EndSection
