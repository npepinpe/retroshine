[Settings]
; Vulkan backend — lower CPU overhead than OpenGL, better async shader support
BackendName = Vulkan

; Native (1x) internal resolution — single biggest GPU/bandwidth win
InternalResolution = 1

; All enhancements off
MSAA = 0
SSAA = False
MaxAnisotropy = 0

; Async shader compilation — prevents the "shader stutter" on first load
; of each effect; trades a couple of frames of glitching for no hard freeze
ShaderCompilationMode = 2

; EFB (Embedded Framebuffer) settings
EFBToTextureEnable = True
EFBScaledCopy = False
EFBCopyEnable = True
; Skips CPU reads of the framebuffer — big speedup in games that do this
; frequently (e.g. Skies of Arcadia battle effects). Can cause minor visual
; glitches in some titles; disable per-game if you see rendering artifacts.
EFBAccessEnable = False

; Widescreen hack — stretches 4:3 output to fill 16:9
; Harmless to enable; games that natively support widescreen ignore it
; Disable per-game if it causes graphical glitches
WideScreenHack = True

[Enhancements]
ForceFiltering = False
DisableFog = False
ArbitraryMipmapDetection = False
