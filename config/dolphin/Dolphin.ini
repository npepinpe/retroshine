[Core]
; JIT recompiler — fastest CPU emulation mode
CPUCore = 1
; Dual-core: splits CPU and GPU emulation across 2 threads — biggest single win
CPUThread = True
; Fast memory: skips bounds checking, safe for 99% of games
Fastmem = True
; MMU emulation disabled — costs ~20% CPU, only needed by a handful of titles
; Enable per-game via right-click → Properties if a game crashes without it
MMU = False
; Skip BIOS intro (speeds up boot, cosmetic only)
SkipIPL = True
; Sync to host GPU — avoids tearing without V-Sync overhead
SyncOnSkipIdle = True
; Audio timing — reduces stutter on underpowered hardware
AudioStretch = False

[Display]
FullscreenResolution = 1920x1080
Fullscreen = True

[Interface]
ConfirmStop = False
